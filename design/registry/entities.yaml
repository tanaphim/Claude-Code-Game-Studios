#       can absorb all damage). Max is uncapped in formula but tuning knob
#       damage_cap in combat.md clamps at 999."
#     added: 2026-03-26
#     revised: ""


# ─── CONSTANTS ───────────────────────────────────────────────────────────────
# Named numerical values referenced across multiple systems.
# Register a constant when it is defined in one GDD but another GDD must
# agree with it (e.g., gold carry limit defined in economy but checked in
# inventory, or base inventory slots defined in inventory but displayed in HUD).
#
# Required fields: name, status, source, referenced_by, value, unit, added

constants:
  - name: INACTIVE_DECAY_DAYS
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 21
    unit: days
    notes: "Days of inactivity before player transitions to Inactive state. Safe range 14–60. Live-tunable from CBS."
    added: 2026-04-27
    revised: ""

  - name: DECAY_RATE_PCT
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 0.07
    unit: fraction
    notes: "Per-cycle decay rate for inactive players' uncommitted Fragments. Pairs with DECAY_INTERVAL_DAYS=3 to give ~30-day half-life. Safe range 0.03–0.15."
    added: 2026-04-27
    revised: ""

  - name: DECAY_INTERVAL_DAYS
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 3
    unit: days
    notes: "Decay batch frequency. Lower = continuous liquidity flow + higher batch load. Safe range 1–30."
    added: 2026-04-27
    revised: ""

  - name: MIN_FRAGMENT_FLOOR
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 1.0
    unit: fragment
    notes: "Floor that triggers full-return rule in InactiveDecay (D1). Prevents infinite micro-decay tail."
    added: 2026-04-27
    revised: ""

  - name: SWITCH_COOLDOWN_DAYS
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 90
    unit: days
    notes: "Minimum cooldown between faction switches. Principle-driven; prevents bandwagon-following. Safe range 30–365."
    added: 2026-04-27
    revised: ""

  - name: BLACKOUT_DAYS_BEFORE_END
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 0
    unit: days
    notes: "Window before cycle end during which switching is blocked (anti-bandwagon). 0 = feature disabled by default. Live-tunable; activate after 1st cycle data."
    added: 2026-04-27
    revised: ""

  - name: FACTION_COUNT
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 5
    unit: factions
    notes: "PLACEHOLDER — final value awaits leadership decision (5 vs 6, OQ-1). System supports both via CBS config."
    added: 2026-04-27
    revised: ""

  - name: FACTION_HEALTH_DECAY_ALERT_PCT
    status: active
    source: design/gdd/faction-system.md
    referenced_by:
      - design/gdd/faction-system.md
    value: 0.02
    unit: fraction
    notes: "Threshold of FactionPoolDecayRate (D4) that triggers ops alert. >threshold for 3+ cycles → faction unhealthy → re-engagement campaign. Live-tunable."
    added: 2026-04-27
    revised: ""

