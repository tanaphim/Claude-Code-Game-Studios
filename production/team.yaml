# Delta Project — Team Roster
#
# Single source of truth สำหรับสมาชิกทีม ใช้โดย /sprint-plan, /sprint-status,
# /story-done และ skill อื่นๆ ที่ต้อง assign งาน
#
# Handle convention:
#   - first-name lowercase (จาก git config user.name)
#   - ถ้าไม่ทราบชื่อจริง → GitHub handle lowercase เป็น proxy
#   - ห้ามใช้ Claude account email ระบุตัวตน (เป็นเมลบริษัท)
#
# Velocity multiplier:
#   - 1.0× = senior / pace ปกติ
#   - 0.6–0.8× = junior หรือคนที่กำลัง onboard
#   - 1.2× = expert ใน domain นั้น (rare)
#
# Roles (agent types) จะ map ตอน assign — ดู .claude/agents/ สำหรับ role list

